<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga Fútbol CEIP El Vetón</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d4a1a" />
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/print.css" media="print" />
</head>
<body>
  <header class="app-header">
    <button id="btn-back" class="btn-back" onclick="goBack()" aria-label="Volver">&#8592;</button>
    <img src="assets/logo.png" alt="Liga Escolar CEIP El Vetón" class="header-logo" />
    <div class="header-text">
      <h1 id="page-title">Liga de Fútbol Escolar CEIP El Vetón</h1>
      <p id="tournament-name">Liga Fútbol CEIP El Vetón</p>
    </div>
    <button id="btn-settings" class="btn-settings" onclick="setView('manage'); saveState();" aria-label="Ajustes">&#9881;</button>
  </header>

  <main class="app-main">
    <section id="view-home" class="view active"></section>
    <section id="view-manage" class="view"></section>
    <section id="view-fixtures" class="view"></section>
    <section id="view-standings" class="view"></section>
  </main>

  <script src="js/state.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/standings.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
